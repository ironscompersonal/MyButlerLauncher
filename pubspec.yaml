name: ai_butler_launcher
description: A premium AI Butler Launcher for Android.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_generative_ai: ^0.4.5
  google_fonts: ^6.2.1
  intl: ^0.19.0
  glass: ^2.0.0+2
  lucide_icons: ^0.257.0
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/forest_bg.jpg
